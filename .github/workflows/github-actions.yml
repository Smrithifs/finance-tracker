name: Basic GitHub Action Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Files
        run: ls -la

      - name: Workflow Success Message
        run: echo "GitHub Actions workflow executed successfully!"
